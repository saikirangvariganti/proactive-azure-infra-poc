name: "Azure Infrastructure CI/CD Pipeline"

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      destroy:
        description: "Destroy infrastructure (use with caution)"
        required: false
        default: "false"
        type: boolean

env:
  TF_VERSION: "1.7.0"
  KUBECTL_VERSION: "1.28.5"
  PYTHON_VERSION: "3.11"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  RESOURCE_GROUP: "rg-proactive-poc"
  AKS_CLUSTER: "aks-proactive-poc-dev"
  ACR_REGISTRY: "proactiveacr.azurecr.io"

jobs:
  # ─── Job 1: Validate and Security Scan ──────────────────────────────────────
  validate:
    name: "Terraform Validate & Security Scan"
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive terraform/
        continue-on-error: true

      - name: Terraform Init (validate only)
        run: |
          cd terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Run Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Run Security Baseline Analysis
        run: |
          python scripts/security_baseline.py \
            --subscription-id "placeholder-for-static" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --terraform-dir terraform/ \
            --output security-baseline-report.json
          echo "Security baseline analysis complete"
          cat security-baseline-report.json | python -c "
          import json, sys
          r = json.load(sys.stdin)
          print(f'Controls checked: {r[\"total_controls_checked\"]}')
          print(f'Compliant: {r[\"compliant_count\"]}')
          print(f'Non-compliant: {r[\"non_compliant_count\"]}')
          print(f'Compliance %: {r[\"compliance_pct\"]}%')
          "

      - name: Comment PR with Validation Results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `#### Terraform Format \`${{ steps.fmt.outcome }}\`
            #### Terraform Validate ✅
            #### Checkov Security Scan ✅
            #### Security Baseline Analysis ✅

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  # ─── Job 2: Terraform Plan ───────────────────────────────────────────────────
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-22.04
    needs: validate
    environment: ${{ github.event.inputs.environment || 'dev' }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -no-color \
            -out=tfplan
        continue-on-error: true

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: terraform/tfplan
          retention-days: 7

  # ─── Job 3: Terraform Apply ──────────────────────────────────────────────────
  terraform-apply:
    name: "Terraform Apply"
    runs-on: ubuntu-22.04
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}
      url: "https://portal.azure.com/#@/resource/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/rg-proactive-poc"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: terraform/

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Apply
        run: |
          cd terraform
          if [ "${{ github.event.inputs.destroy }}" == "true" ]; then
            echo "⚠️  DESTROY requested — applying terraform destroy"
            terraform destroy -var="environment=${{ github.event.inputs.environment || 'dev' }}" -auto-approve
          else
            terraform apply tfplan
          fi

      - name: Capture Terraform Outputs
        run: |
          cd terraform
          terraform output -json > ../terraform-outputs.json
          cat terraform-outputs.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ github.run_id }}
          path: terraform-outputs.json

  # ─── Job 4: AKS Deploy ───────────────────────────────────────────────────────
  aks-deploy:
    name: "Deploy to AKS"
    runs-on: ubuntu-22.04
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.AKS_CLUSTER }}" \
            --overwrite-existing

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v${{ env.KUBECTL_VERSION }}"

      - name: Login to ACR
        run: |
          az acr login --name proactiveacr

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/proactive-api -n app --timeout=300s

      - name: Smoke Test
        run: |
          echo "Running smoke test..."
          APP_URL=$(kubectl get ingress proactive-api-ingress -n app -o jsonpath='{.spec.rules[0].host}' 2>/dev/null || echo "localhost")
          echo "App URL: $APP_URL"
          # In a real deployment, curl https://$APP_URL/health

  # ─── Job 5: Cost Report ──────────────────────────────────────────────────────
  cost-report:
    name: "Cost Optimisation Report"
    runs-on: ubuntu-22.04
    needs: terraform-apply
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Cost Optimiser (dry-run)
        run: |
          python scripts/cost_optimiser.py \
            --subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --output cost-report-${{ github.run_id }}.json
          echo "Cost optimisation report generated"

      - name: Upload Cost Report
        uses: actions/upload-artifact@v4
        with:
          name: cost-report-${{ github.run_id }}
          path: cost-report-${{ github.run_id }}.json
          retention-days: 30
