apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: azure-infrastructure-alerts
  namespace: monitoring
  labels:
    app: prometheus
    release: prometheus-stack
spec:
  groups:
    - name: azure.aks.cluster
      interval: 30s
      rules:
        - alert: AKSNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 5m
          labels:
            severity: critical
            environment: production
          annotations:
            summary: "AKS node {{ $labels.node }} is not ready"
            description: "AKS node {{ $labels.node }} has been in NotReady state for more than 5 minutes."

        - alert: AKSNodeHighCPU
          expr: (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) by (node)) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High CPU on AKS node {{ $labels.node }}"
            description: "AKS node {{ $labels.node }} CPU usage is {{ $value | humanize }}%."

        - alert: AKSNodeHighMemory
          expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High memory on AKS node {{ $labels.node }}"
            description: "AKS node {{ $labels.node }} memory usage is {{ $value | humanize }}%."

        - alert: AKSPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} restarted {{ $value | humanize }} times in 5m."

        - alert: AKSPodNotRunning
          expr: kube_pod_status_phase{phase!~"Running|Succeeded"} == 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} stuck in {{ $labels.phase }}"

    - name: azure.vnet.networking
      rules:
        - alert: AzureHighInboundTraffic
          expr: azure_network_in_bytes_total > 1073741824
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High inbound network traffic on Azure VNet"
            description: "Inbound traffic exceeded 1GB/s — potential DDoS or misconfiguration."

        - alert: NSGDeniedConnectionsHigh
          expr: azure_nsg_denied_flows_total > 100
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High NSG denied connections"
            description: "More than 100 connections denied by NSG in 5m — review security rules."

    - name: azure.sql.database
      rules:
        - alert: AzureSQLHighDTU
          expr: azure_sql_dtu_consumption_percent > 90
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Azure SQL DTU usage critical"
            description: "Azure SQL database DTU consumption is {{ $value }}% — approaching limit."

        - alert: AzureSQLConnectionPoolExhausted
          expr: azure_sql_connection_count >= azure_sql_connection_limit * 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Azure SQL connection pool near exhaustion"

        - alert: AzureSQLStorageFull
          expr: azure_sql_storage_percent > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Azure SQL storage above 85%"

    - name: azure.keyvault.security
      rules:
        - alert: KeyVaultAccessDenied
          expr: azure_keyvault_api_hit_total{result="Forbidden"} > 10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Multiple Key Vault access denials"
            description: "{{ $value }} unauthorized Key Vault access attempts in 5m — possible security incident."

        - alert: KeyVaultSecretExpiringSoon
          expr: azure_keyvault_secret_days_to_expiry < 30
          labels:
            severity: warning
          annotations:
            summary: "Key Vault secret expiring in {{ $value }} days"

    - name: azure.infrastructure.availability
      rules:
        - alert: ServiceEndpointUnhealthy
          expr: probe_success == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Service endpoint {{ $labels.instance }} is down"

        - alert: CertificateExpiryWarning
          expr: probe_ssl_earliest_cert_expiry - time() < 86400 * 30
          labels:
            severity: warning
          annotations:
            summary: "TLS certificate expiring in {{ $value | humanizeDuration }}"

        - alert: HighErrorRate
          expr: sum(rate(http_requests_total{status=~"5.."}[5m])) by (service) / sum(rate(http_requests_total[5m])) by (service) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High error rate for service {{ $labels.service }}"
            description: "Error rate is {{ $value | humanizePercentage }}."
